version: "3.8"

services:
  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_POLL_INTERVAL=300       # check every 5 minutes
      - WATCHTOWER_CLEANUP=true            # remove old images after update
      - WATCHTOWER_INCLUDE_STOPPED=false
      - WATCHTOWER_SCOPE=homelab           # only watch containers with this label
      - WATCHTOWER_HTTP_API_UPDATE=true
      - WATCHTOWER_HTTP_API_PERIODIC_POLLS=true   # keep the 5-minute poll running alongside the HTTP API
      # Token is read from .env on the host (see .env.example). Never commit a real token.
      - WATCHTOWER_HTTP_API_TOKEN=${WATCHTOWER_HTTP_API_TOKEN}
    ports:
      - "8080:8080"
    # Remove the SCOPE lines above to watch ALL containers on the NAS (broader)

  homelab-dashboard:
    # Pull pre-built image from GitHub Container Registry.
    # Run update.sh on the NAS to pull the latest and redeploy.
    image: ghcr.io/loswastaken/homelab-dashboard:latest

    # Uncomment `build` to build locally instead of pulling from GHCR.
    # build:
    #   context: .
    #   dockerfile: Dockerfile

    container_name: homelab-dashboard

    # Host networking lets the health-check reach other containers and LAN
    # IPs (Plex, Sonarr, etc.) without NAT hairpin issues on Synology.
    # Remove this and uncomment `ports` below if you prefer bridge networking.
    network_mode: host

    # ports:           # ← use this instead of network_mode: host if preferred
    #   - "55964:55964"

    environment:
      - PORT=55964
      - TZ=America/New_York
      - WATCHTOWER_HTTP_API_TOKEN=${WATCHTOWER_HTTP_API_TOKEN}
      - WATCHTOWER_HTTP_API_URL=http://localhost:8080

    volumes:
      # Persist services.json — edit this path to match your NAS volume layout.
      - /volume2/docker/homelab-dashboard/data:/app/data

    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.scope=homelab"  # opt this container into watchtower

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:55964/api/services"]
      interval: 30s
      timeout: 5s
      retries: 3
