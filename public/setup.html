<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Setup · los.dev Homelab</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-base: #131110; --bg-surf: #1a1815; --bg-card: #1e1c18; --bg-hi: #2c2922;
      --tp: #ede8d5; --ts: #7a7165; --tm: #46423b;
      --b0: rgba(237,232,213,.05); --b1: rgba(237,232,213,.09); --b2: rgba(237,232,213,.18);
      --green: #5a9e72; --green-bg: rgba(90,158,114,.14);
      --red: #b85555; --red-bg: rgba(184,85,85,.14);
      --amber: #c4884a; --amber-bg: rgba(196,136,74,.14);
    }
    html, body { height: 100%; background: var(--bg-base); color: var(--tp);
      font-family: 'Sora', sans-serif; font-size: 14px; -webkit-font-smoothing: antialiased; }
    body { display: flex; align-items: center; justify-content: center; }
    body::before { content: ''; position: fixed; inset: 0;
      background-image: radial-gradient(circle, rgba(237,232,213,.05) 1px, transparent 1px);
      background-size: 28px 28px; pointer-events: none; }

    .card { position: relative; z-index: 1; width: min(380px, calc(100vw - 32px)); background: var(--bg-card);
      border: 1px solid var(--b1); border-radius: 14px; padding: 36px 32px; }

    .logo { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; }
    .logo img { width: 36px; height: 36px; border-radius: 8px; }
    .logo-label { font-size: 10px; font-weight: 500; letter-spacing: .14em;
      text-transform: uppercase; color: var(--tm); }
    .logo-name { font-size: 18px; font-weight: 600; letter-spacing: -.03em; color: var(--tp); }

    .first-run { display: inline-flex; align-items: center; gap: 6px; font-size: 10px;
      font-weight: 500; letter-spacing: .1em; text-transform: uppercase;
      color: var(--amber); background: var(--amber-bg);
      border: 1px solid rgba(196,136,74,.22); border-radius: 20px;
      padding: 3px 10px; margin-bottom: 14px; }

    h1 { font-size: 20px; font-weight: 600; letter-spacing: -.02em; margin-bottom: 6px; }
    .sub { font-size: 12px; color: var(--ts); margin-bottom: 28px; line-height: 1.6; }

    .field { margin-bottom: 14px; }
    label { display: block; font-size: 11px; font-weight: 500; color: var(--ts);
      letter-spacing: .04em; margin-bottom: 5px; }
    input { width: 100%; background: var(--bg-surf); border: 1px solid var(--b1);
      border-radius: 7px; padding: 10px 14px; color: var(--tp);
      font-family: 'Sora', sans-serif; font-size: 13px; outline: none;
      transition: border-color .15s; }
    input:focus { border-color: var(--b2); }
    input::placeholder { color: var(--tm); }

    .hint { font-size: 11px; color: var(--tm); margin-top: 4px; }

    .strength { display: flex; gap: 3px; margin-top: 6px; }
    .str-bar { flex: 1; height: 3px; border-radius: 2px; background: var(--b1);
      transition: background .2s; }

    .btn { width: 100%; margin-top: 6px; padding: 11px; font-family: 'Sora', sans-serif;
      font-size: 13px; font-weight: 600; color: var(--tp); background: var(--bg-hi);
      border: 1px solid var(--b2); border-radius: 7px; cursor: pointer;
      transition: all .15s; }
    .btn:hover { background: rgba(237,232,213,.12); }
    .btn:disabled { opacity: .5; cursor: default; }

    .msg { display: none; margin-top: 14px; padding: 10px 14px; border-radius: 7px;
      font-size: 12px; }
    .msg.error { background: var(--red-bg); border: 1px solid rgba(184,85,85,.22); color: var(--red); }
    .msg.show { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <img src="/favicon.svg" alt="logo">
      <div>
        <div class="logo-label">Homelab</div>
        <div class="logo-name">los.dev</div>
      </div>
    </div>

    <div class="first-run">⚡ First-time setup</div>

    <h1>Create your account</h1>
    <p class="sub">This runs once. Set your admin credentials — you'll use these to sign in every time.</p>

    <form onsubmit="setup(event)">
      <div class="field">
        <label>Your name <span style="color:var(--tm);font-weight:400">(shown in greeting)</span></label>
        <input id="displayName" type="text" placeholder="Alex">
      </div>
      <div class="field">
        <label>Username</label>
        <input id="username" type="text" placeholder="admin" autocomplete="username" required>
      </div>
      <div class="field">
        <label>Password</label>
        <input id="password" type="password" placeholder="••••••••"
          autocomplete="new-password" required oninput="updateStrength(this.value)">
        <div class="strength">
          <div class="str-bar" id="s1"></div>
          <div class="str-bar" id="s2"></div>
          <div class="str-bar" id="s3"></div>
          <div class="str-bar" id="s4"></div>
        </div>
        <div class="hint" id="str-hint">Minimum 8 characters</div>
      </div>
      <div class="field">
        <label>Confirm Password</label>
        <input id="confirm" type="password" placeholder="••••••••" autocomplete="new-password" required>
      </div>
      <button class="btn" id="btn" type="submit">Create Account</button>
    </form>

    <div class="msg error" id="err"></div>
  </div>

  <script>
    function updateStrength(pw) {
      const bars   = [s1, s2, s3, s4];
      const hint   = document.getElementById('str-hint');
      let score    = 0;
      if (pw.length >= 8)  score++;
      if (pw.length >= 12) score++;
      if (/[A-Z]/.test(pw) && /[a-z]/.test(pw)) score++;
      if (/[0-9!@#$%^&*]/.test(pw)) score++;

      const colors = ['#b85555', '#c4884a', '#c4884a', '#5a9e72'];
      const labels = ['Too short', 'Weak', 'Fair', 'Strong'];

      bars.forEach((b, i) => {
        b.style.background = i < score ? colors[Math.min(score - 1, 3)] : 'var(--b1)';
      });
      hint.textContent = pw.length === 0 ? 'Minimum 8 characters' : labels[Math.min(score, 3)];
      hint.style.color = score > 0 ? colors[Math.min(score - 1, 3)] : 'var(--tm)';
    }

    async function setup(e) {
      e.preventDefault();
      const err = document.getElementById('err');
      const btn = document.getElementById('btn');
      err.classList.remove('show');

      const displayName = document.getElementById('displayName').value.trim();
      const username    = document.getElementById('username').value.trim();
      const password    = document.getElementById('password').value;
      const confirm     = document.getElementById('confirm').value;

      if (password !== confirm) {
        err.textContent = 'Passwords do not match';
        err.classList.add('show');
        return;
      }
      if (password.length < 8) {
        err.textContent = 'Password must be at least 8 characters';
        err.classList.add('show');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Creating account…';

      try {
        const res = await fetch('/api/setup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password, displayName }),
        });
        const data = await res.json();
        if (res.ok) {
          window.location.href = '/';
        } else {
          err.textContent = data.error || 'Setup failed';
          err.classList.add('show');
          btn.disabled = false;
          btn.textContent = 'Create Account';
        }
      } catch {
        err.textContent = 'Connection error — is the server running?';
        err.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    }
  </script>
</body>
</html>
